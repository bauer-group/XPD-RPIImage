# SPDX-License-Identifier: MIT
# =============================================================================
# BAUER GROUP XPD-RPIImage - image build pipeline
# =============================================================================
name: 📦 Build Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/**"
  workflow_dispatch:
    inputs:
      variant:
        description: "🎯 Variant to build (blank = all discovered)"
        required: false
        default: ""
      skip_build:
        description: "⏭️ Skip image build (validate only)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  # CustomPiOS: master because 1.5.0 predates raspios' .img.xz switch and
  # is missing the base_image_downloader.  For strict reproducibility pin
  # CUSTOMPIOS_REF to a concrete commit SHA here.
  CUSTOMPIOS_IMAGE: "guysoft/custompios:devel"
  CUSTOMPIOS_REF:   "master"

jobs:
  # =========================================================================
  # 🔍  Validate every variant JSON and compute the build matrix in one job.
  # =========================================================================
  validate:
    name: 🔍 Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      variants: ${{ steps.matrix.outputs.variants }}
      count:    ${{ steps.matrix.outputs.count }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: ⚙️ Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: 🧪 Syntax check
        run: python -m py_compile scripts/generate.py

      - name: ✅ Validate all variants
        run: |
          set -euo pipefail
          for f in config/variants/*.json; do
            echo "::group::🔍 $f"
            python scripts/generate.py "$f" --dry-run >/dev/null
            echo "::endgroup::"
          done

      - name: 🚬 Render smoke test (canbus-plattform)
        env:
          ADMIN_PASSWORD: ci-placeholder-pw
          WIFI_PSK: ci-placeholder-psk
        run: python scripts/generate.py config/variants/canbus-plattform.json

      - name: 🎯 Compute build matrix
        id: matrix
        run: |
          set -euo pipefail
          input='${{ inputs.variant }}'
          if [[ -n "$input" ]]; then
            v="[\"$input\"]"
          else
            v=$(ls config/variants/*.json | xargs -n1 basename | sed 's/\.json$//' \
                | jq -R -s -c 'split("\n") | map(select(length>0))')
          fi
          echo "variants=$v" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$v" | jq 'length')" >> "$GITHUB_OUTPUT"

      - name: 📋 Validation summary
        if: always()
        run: |
          {
            echo "## 🔍 Validation"
            echo ""
            echo "| variant | version | schema |"
            echo "| --- | --- | --- |"
            for f in config/variants/*.json; do
              name=$(basename "$f" .json)
              version=$(jq -r '.variant.version // "?"' "$f")
              echo "| \`$name\` | v$version | ✅ |"
            done
            echo ""
            echo "🎯 **build matrix** (${{ steps.matrix.outputs.count }}): \`${{ steps.matrix.outputs.variants }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # =========================================================================
  # 📦  Actual image build - one parallel job per variant.
  # =========================================================================
  build:
    name: 📦 Build ${{ matrix.variant }}
    needs: validate
    if: ${{ !inputs.skip_build }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(needs.validate.outputs.variants) }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: ⚙️ Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: 🧹 Free runner disk
        run: |
          set -e
          sudo rm -rf /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          echo "free: $(df -h / | awk 'NR==2 {print $4}')"

      - name: 🔧 Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user-static binfmt-support kpartx xz-utils zip unzip

      - name: 💾 Cache CustomPiOS checkout
        uses: actions/cache@v5
        with:
          path: CustomPiOS
          key: custompios-${{ hashFiles('scripts/bootstrap.sh') }}
          restore-keys: custompios-

      - name: 🔑 Resolve variant metadata
        id: meta
        env:
          ADMIN_PASSWORD: ci-placeholder-pw
          WIFI_PSK:       ci-placeholder-psk
        run: |
          set -euo pipefail
          cfg="config/variants/${{ matrix.variant }}.json"
          # Render the full extends-merged config to a sidecar JSON so every
          # subsequent step can `jq` it without re-running the generator.
          python scripts/generate.py "$cfg" --json > /tmp/resolved.json
          version=$(jq -r '.variant.version // "0.0.0"' /tmp/resolved.json)
          sha_short="${GITHUB_SHA:0:7}"

          # Artefact / file naming:
          #   tag push       -> v<version>                 (clean release asset)
          #   pull_request   -> v<version>-pr<n>-<sha>     (traceable per PR)
          #   main / dispatch -> v<version>-<sha>          (commit-unique)
          # The suffix ends up inside the .img.xz filename AND the GH artifact.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              suffix=""
              kind="release"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
              suffix="-pr${{ github.event.pull_request.number }}-${sha_short}"
              kind="pr"
          else
              suffix="-${sha_short}"
              kind="push"
          fi
          {
              echo "version=${version}"
              echo "sha_short=${sha_short}"
              echo "suffix=${suffix}"
              echo "kind=${kind}"
              echo "full_tag=v${version}${suffix}"
              echo "start_epoch=$(date +%s)"
          } >> "$GITHUB_OUTPUT"

      - name: 🖼️ Build image
        env:
          ADMIN_PASSWORD:      ${{ secrets.ADMIN_PASSWORD || 'ci-placeholder-pw' }}
          WIFI_PSK:            ${{ secrets.WIFI_PSK       || 'ci-placeholder-psk' }}
          CUSTOMPIOS_REF:      ${{ env.CUSTOMPIOS_REF }}
          VERSION:             ${{ steps.meta.outputs.version }}
          IMAGE_SUFFIX:        ${{ steps.meta.outputs.suffix }}
          # CI runner is already a Linux VM with loop devices; run natively
          # instead of spawning a privileged guysoft/custompios sibling.
          # Saves a ~700 MB image pull + ~10 s container startup per job.
          BGRPI_NATIVE_BUILD:  "yes"
        run: sudo -E bash scripts/build.sh "${{ matrix.variant }}"

      - name: 📝 Compute checksums
        id: checksum
        working-directory: dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(*.img.xz)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::no image produced in dist/"
            exit 1
          fi
          for f in "${files[@]}"; do
            sha256sum "$f" > "$f.sha256"
          done
          sha=$(awk '{print $1}' "${files[0]}.sha256")
          size=$(du -h "${files[0]}" | cut -f1)
          bytes=$(stat -c '%s' "${files[0]}")
          echo "sha=$sha"     >> "$GITHUB_OUTPUT"
          echo "size=$size"   >> "$GITHUB_OUTPUT"
          echo "bytes=$bytes" >> "$GITHUB_OUTPUT"
          echo "file=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: 📋 Build summary
        if: always()
        env:
          VARIANT:    ${{ matrix.variant }}
          VERSION:    ${{ steps.meta.outputs.version }}
          FULL_TAG:   ${{ steps.meta.outputs.full_tag }}
          KIND:       ${{ steps.meta.outputs.kind }}
          START:      ${{ steps.meta.outputs.start_epoch }}
          FILE:       ${{ steps.checksum.outputs.file }}
          SIZE:       ${{ steps.checksum.outputs.size }}
          BYTES:      ${{ steps.checksum.outputs.bytes }}
          SHA:        ${{ steps.checksum.outputs.sha }}
        run: |
          set -euo pipefail
          RESOLVED=/tmp/resolved.json
          [[ -r "$RESOLVED" ]] || { echo "no resolved config; summary skipped"; exit 0; }

          # --- Extract metadata -------------------------------------------------
          description=$(jq -r '.variant.description // "-"'         "$RESOLVED")
          targets=$(jq -r '.targets | join(", ")'                   "$RESOLVED")
          hostname=$(jq -r '.hostname'                              "$RESOLVED")
          arch=$(jq -r '.base_image.arch'                           "$RESOLVED")
          base_url=$(jq -r '.base_image.url'                        "$RESOLVED")
          base_img=$(basename "$base_url")
          pkg_count=$(jq -r '.packages | length'                    "$RESOLVED")
          user_count=$(jq -r '.users | length'                      "$RESOLVED")
          users=$(jq -r '[.users[].name] | join(", ")'              "$RESOLVED")
          removed=$(jq -r '.remove_users // [] | join(", ") // "-"' "$RESOLVED")
          overlays=$(jq -r '[.boot_config.dtoverlays[]?.name] | join(", ")' "$RESOLVED")
          overlay_count=$(jq -r '.boot_config.dtoverlays // [] | length' "$RESOLVED")
          can_ifaces=$(jq -r '.can.interfaces // [] | length'       "$RESOLVED")
          can_detail=$(jq -r '[.can.interfaces // []
                              | .[] | "\(.name) @ \(.bitrate/1000) kbit/s (txq=\(.txqueuelen // "-"))"] | join(", ")' "$RESOLVED")

          ssh_enabled=$(jq -r '.ssh.enabled // true'                "$RESOLVED")
          docker_enabled=$(jq -r '.docker.enabled // false'         "$RESOLVED")
          portainer_enabled=$(jq -r '.portainer.enabled // false'   "$RESOLVED")
          portainer_bind=$(jq -r '.portainer.bind // "-"'           "$RESOLVED")
          portainer_ports=$(jq -r '.portainer.ports | "edge=\(.edge) http=\(.http) https=\(.https)"' "$RESOLVED")
          uu_enabled=$(jq -r '.unattended_upgrades.enabled // false' "$RESOLVED")
          uu_window=$(jq -r '.unattended_upgrades.schedule | "\(.start)-\(.end)"' "$RESOLVED")
          reboot_window=$(jq -r '.unattended_upgrades.auto_reboot.window | "\(.start)-\(.end)"' "$RESOLVED")
          banner_enabled=$(jq -r '.banner.enabled // false'         "$RESOLVED")

          # Hardware blocks
          cam_enabled=$(jq -r '.camera.enabled // false'            "$RESOLVED")
          hdmi_count=$(jq -r '.hdmi.outputs // [] | length'         "$RESOLVED")
          audio_default=$(jq -r '.audio.default_output // "auto"'   "$RESOLVED")
          onewire_enabled=$(jq -r '.gpio.one_wire.enabled // false' "$RESOLVED")
          rtc_enabled=$(jq -r '.rtc.enabled // false'               "$RESOLVED")
          rtc_model=$(jq -r '.rtc.model // "-"'                     "$RESOLVED")
          fan_enabled=$(jq -r '.fan.enabled // false'               "$RESOLVED")
          fan_mode=$(jq -r '.fan.mode // "-"'                       "$RESOLVED")
          leds_power=$(jq -r '.leds.power // "default"'             "$RESOLVED")
          leds_activity=$(jq -r '.leds.activity // "default"'       "$RESOLVED")
          oc_enabled=$(jq -r '.overclock.enabled // false'          "$RESOLVED")
          oc_arm=$(jq -r '.overclock.arm_freq // "-"'               "$RESOLVED")
          mem_gpu=$(jq -r '.memory.gpu_mem // "-"'                  "$RESOLVED")
          pcie_enabled=$(jq -r '.pcie.enabled // false'             "$RESOLVED")
          pcie_gen=$(jq -r '.pcie.gen // "-"'                       "$RESOLVED")
          usb_3a=$(jq -r '.usb.max_usb_current // false'            "$RESOLVED")
          boot_order=$(jq -r '.bootloader.boot_order // "-"'        "$RESOLVED")
          wd_enabled=$(jq -r '.watchdog.enabled // false'           "$RESOLVED")

          yn() { [[ "$1" == "true" ]] && echo "✅ yes" || echo "❌ no"; }

          # --- Build duration ---------------------------------------------------
          now=$(date +%s)
          duration="$(( (now - START) / 60 ))m $(( (now - START) % 60 ))s"

          # --- Emit summary -----------------------------------------------------
          case "$KIND" in
            release) badge="🏷️ RELEASE";;
            pr)      badge="🔀 PR BUILD";;
            *)       badge="🚧 DEV BUILD";;
          esac
          {
            echo "# 📦 ${VARIANT} · ${FULL_TAG} · ${badge}"
            echo ""
            echo "> ${description}"
            echo ""
            echo "## 🎯 Target"
            echo "| key | value |"
            echo "|---|---|"
            echo "| Variant | \`${VARIANT}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Hostname | \`${hostname}\` |"
            echo "| Architecture | ${arch} |"
            echo "| Hardware targets | ${targets} |"
            echo "| Base image | \`${base_img}\` |"
            echo ""
            echo "## ⚙️ Feature matrix"
            echo "| feature | state | detail |"
            echo "|---|---|---|"
            echo "| 🔒 SSH                  | $(yn "$ssh_enabled")        | password auth, no root |"
            echo "| 🐳 Docker               | $(yn "$docker_enabled")     | CE + compose plugin, IPv6 NAT |"
            echo "| 🎛 Portainer            | $(yn "$portainer_enabled")  | ${portainer_bind}, ${portainer_ports} |"
            echo "| 🚌 CAN                  | $([[ $can_ifaces -gt 0 ]] && echo ✅ yes || echo ❌ no) | ${can_detail:--} |"
            echo "| 🔄 Unattended upgrades  | $(yn "$uu_enabled")         | window ${uu_window}, reboot ${reboot_window} |"
            echo "| 🖼 Banner / MOTD        | $(yn "$banner_enabled")     | /etc/issue(.net) + dynamic MOTD |"
            echo ""
            echo "## 🔧 Hardware"
            echo "| block | state | detail |"
            echo "|---|---|---|"
            echo "| 📷 Camera               | $(yn "$cam_enabled")     | libcamera autodetect |"
            echo "| 🖥 HDMI outputs         | ${hdmi_count}            | per-port group/mode/audio |"
            echo "| 🔊 Audio default sink   | \`${audio_default}\`     | ALSA pcm.!default |"
            echo "| 🔌 1-Wire               | $(yn "$onewire_enabled") | w1-gpio overlay |"
            echo "| ⏰ RTC                  | $(yn "$rtc_enabled")     | ${rtc_model} |"
            echo "| 🌬 Fan                  | $(yn "$fan_enabled")     | mode=${fan_mode} |"
            echo "| 💡 LEDs                 | pwr=${leds_power} act=${leds_activity} | dtparam triggers |"
            echo "| 🏎 Overclock            | $(yn "$oc_enabled")      | arm=${oc_arm}MHz |"
            echo "| 💾 GPU mem              | ${mem_gpu} MiB           | VideoCore reservation |"
            echo "| 🔗 PCIe                 | $(yn "$pcie_enabled")    | gen=${pcie_gen} |"
            echo "| 🔌 USB 3A (Pi4)         | $(yn "$usb_3a")          | max_usb_current |"
            echo "| 🧭 Bootloader           | ${boot_order}            | Pi5/CM5 EEPROM boot_order |"
            echo "| 🐕 Watchdog             | $(yn "$wd_enabled")      | bcm2835-wdt via systemd |"
            echo ""
            echo "## 🧩 Contents"
            echo "| key | value |"
            echo "|---|---|"
            echo "| Installed packages | ${pkg_count} |"
            echo "| Users | ${user_count} · ${users} |"
            echo "| Removed users | ${removed:--} |"
            echo "| Device tree overlays | ${overlay_count}${overlays:+ · $overlays} |"
            echo ""
            echo "## 📦 Artifact"
            echo "| key | value |"
            echo "|---|---|"
            echo "| File | \`${FILE}\` |"
            echo "| Compressed size | ${SIZE} (${BYTES} bytes) |"
            echo "| SHA-256 | \`${SHA}\` |"
            echo ""
            echo "## 🏷️ Build context"
            echo "| key | value |"
            echo "|---|---|"
            echo "| Commit | [\`${GITHUB_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |"
            echo "| Ref | \`${GITHUB_REF}\` |"
            echo "| Triggered by | \`${GITHUB_EVENT_NAME}\` · @${GITHUB_ACTOR} |"
            echo "| Runner | \`${RUNNER_OS} ${RUNNER_ARCH}\` |"
            echo "| Duration | ${duration} |"
            echo ""
            echo "### 🔐 Verify"
            echo '```bash'
            echo "echo \"${SHA}  ${FILE}\" | sha256sum -c -"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bgrpiimage-${{ matrix.variant }}-${{ steps.meta.outputs.full_tag }}
          path: |
            dist/*.img.xz
            dist/*.sha256
          retention-days: 14
          if-no-files-found: error
          compression-level: 0

  # =========================================================================
  # 🚀  Tag push -> create GitHub release with all built image artifacts.
  # =========================================================================
  release:
    name: 🚀 Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      # The GitHub release itself is created by release.yml (semantic-release)
      # when the version is bumped on main. Here we only *append* the image
      # artifacts + verify/flash instructions to that existing release.
      # `append_body: true` keeps semantic-release's auto-generated changelog
      # intact; without it, the body would be overwritten.
      - name: 🏷️ Attach images to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/*.img.xz
            release-assets/*.sha256
          fail_on_unmatched_files: true
          append_body: true
          body: |

            ---

            ## 📦 Image artifacts — ${{ github.ref_name }}

            Built from commit `${{ github.sha }}`.

            ### 🔐 Verify

            ```bash
            sha256sum -c *.sha256
            ```

            ### 📥 Flash

            Write directly to SD card / eMMC with `dd`, Raspberry Pi Imager or balenaEtcher.
