# SPDX-License-Identifier: MIT
# =============================================================================
# BAUER GROUP XPD-RPIImage - GitHub Pages catalog publisher
# =============================================================================
# Publishes:
#   - https://bauer-group.github.io/XPD-RPIImage/rpi-imager.json  (OS list)
#   - https://bauer-group.github.io/XPD-RPIImage/                 (info page)
#
# To move to a custom domain (e.g. rpi.pages.dvcs.app.bauer-group.com):
#   1. Add DNS CNAME <subdomain> -> bauer-group.github.io
#   2. Drop a `site/CNAME` file containing the full hostname
#   3. Flip SITE_URL below to https://<subdomain>
#   4. Once GitHub provisions the cert, run:
#        gh api --method PUT repos/bauer-group/XPD-RPIImage/pages \
#          -f cname=<subdomain> -F https_enforced=true
#
# The catalog always points at the *latest* GitHub release. It is refreshed:
#   - on release:published (normal path, triggered by semantic-release +
#     softprops/action-gh-release appending the image assets)
#   - on manual workflow_dispatch (force re-render, e.g. after fixing
#     something in scripts/build_pages.py)
#
# Legacy releases (e.g. v0.1.0, built before manifest.json was added to the
# asset list) get their manifest reconstructed from the .img.xz + .sha256
# assets right here so the catalog never shows a gap.
# =============================================================================

name: 🌐 Pages

on:
  release:
    types: [published, edited, released]

  # Image assets are attached to a release AFTER it's created - that
  # happens inside the build workflow via softprops/action-gh-release.
  # Re-publish the catalog when a build completes successfully so the
  # site tracks the newest image-bearing release without manual kicks.
  workflow_run:
    workflows: ["📦 Build Image"]
    types: [completed]

  # Re-render the landing page whenever its source changes on main. The
  # catalog still points at the LATEST release (resolved at runtime), so
  # editing CSS or templates doesn't need a new image build.
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build_pages.py'
      - '.github/workflows/pages.yml'

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (blank = latest)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Public URL the site is served from. Overridden by site/CNAME when
  # present (see header comment for custom-domain migration).
  SITE_URL: "https://bauer-group.github.io/XPD-RPIImage"

jobs:
  build:
    name: 🧱 Render site
    # Skip if the originating build failed/cancelled - no point pushing a
    # stale catalog. Other trigger types have no `workflow_run` context,
    # so the expression evaluates to `true` for them (empty != 'failure').
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tag: ${{ steps.target.outputs.tag }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🎯 Resolve target release
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Does a release carry at least one .img.xz asset? A release
          # tag is created BEFORE build.yml finishes attaching images, so
          # we only treat a release as publishable once the images have
          # landed - otherwise we'd overwrite a working catalog with an
          # empty one during the ~25 min build window.
          has_images() {
            gh release view "$1" -R "$GITHUB_REPOSITORY" \
              --json assets -q '[.assets[] | select(.name | endswith(".img.xz"))] | length' 2>/dev/null \
              | grep -qv "^0$"
          }

          tag="${{ inputs.tag }}"
          # For release events the tag is explicit; trust it even if assets
          # are still uploading (the workflow will be re-triggered by the
          # next `edited` event once images finish uploading).
          if [[ -z "$tag" ]]; then
            tag="${{ github.event.release.tag_name || '' }}"
          fi

          # Otherwise pick the most recent release that actually has images.
          if [[ -z "$tag" ]]; then
            while read -r candidate; do
              [[ -n "$candidate" ]] || continue
              if has_images "$candidate"; then
                tag="$candidate"
                break
              fi
              echo "::notice::skipping $candidate - no image assets yet"
            done < <(gh release list --limit 10 --json tagName -q '.[].tagName' -R "$GITHUB_REPOSITORY")
          fi

          if [[ -z "$tag" ]]; then
            echo "::error::no release with image assets found - has build.yml finished on any tag?"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "::notice::publishing catalog for $tag"

      - name: ⬇ Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "${{ steps.target.outputs.tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --dir release-assets \
              --pattern "*.img.xz" \
              --pattern "*.sha256" \
              --pattern "*.manifest.json"
          ls -la release-assets

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: ⚙️ Install Python dependencies
        # generate.py imports jsonschema + rich eagerly, so even the json
        # subcommand fails without them. Install unconditionally - the site
        # renderer itself has no extra deps but the reconstruct step leans
        # on generate.py for description / targets / hostname.
        run: python -m pip install -r scripts/requirements.txt

      - name: 🏗 Reconstruct missing manifests (legacy releases)
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          cd release-assets
          shopt -s nullglob
          for img in *.img.xz; do
            manifest="${img%.img.xz}.manifest.json"
            if [[ -f "$manifest" ]]; then
              echo "keep: $manifest"
              continue
            fi
            echo "reconstruct: $manifest"
            variant="${img#bgrpiimage-}"
            variant="${variant%-v*}"
            version="${TAG#v}"

            download_size=$(stat -c '%s' "$img")
            download_sha=$(awk '{print $1}' "${img}.sha256")
            extract_size=$(xz -l --robot "$img" | awk '/^file/ { print $5 }')
            extract_sha=$(xz -dc "$img" | sha256sum | awk '{print $1}')

            url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}/${img}"
            # Description + targets: pull from the current variant JSON.
            # For a legacy release where the variant file no longer exists
            # we fall back to a generic description.
            cfg="../config/variants/${variant}.json"
            if [[ -f "$cfg" ]]; then
              description=$(python ../scripts/generate.py "$cfg" --json 2>/dev/null \
                            | jq -r '.variant.description // ""')
              targets=$(python ../scripts/generate.py "$cfg" --json 2>/dev/null \
                            | jq -c '.targets // []')
              hostname=$(python ../scripts/generate.py "$cfg" --json 2>/dev/null \
                            | jq -r '.hostname // "-"')
            else
              description="BAUER GROUP RPIImage - ${variant}"
              targets='["rpi4","rpi5","cm4","cm5"]'
              hostname="-"
            fi

            jq -n \
              --arg variant      "$variant" \
              --arg version      "$version" \
              --arg full_tag     "$TAG" \
              --arg kind         "release" \
              --arg description  "$description" \
              --argjson targets  "$targets" \
              --arg hostname     "$hostname" \
              --arg release_date "$(date -u +%Y-%m-%d)" \
              --arg image_file   "$img" \
              --arg image_url    "$url" \
              --argjson image_size "$download_size" \
              --arg image_sha    "$download_sha" \
              --argjson extract_size "$extract_size" \
              --arg extract_sha  "$extract_sha" \
              '{
                variant: $variant,
                version: $version,
                full_tag: $full_tag,
                kind: $kind,
                description: $description,
                targets: $targets,
                hostname: $hostname,
                release_date: $release_date,
                image: {
                  file: $image_file,
                  url:  $image_url,
                  download_size: $image_size,
                  download_sha256: $image_sha,
                  extract_size: $extract_size,
                  extract_sha256: $extract_sha
                }
              }' > "$manifest"
          done

      - name: 🧱 Render site
        env:
          TAG:  ${{ steps.target.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p _site

          # Copy static assets (stylesheet, logos). Templates are not copied
          # - the renderer consumes them from site/ directly.
          cp site/styles.css           _site/styles.css
          cp site/logo.svg             _site/logo.svg
          cp site/logo-wide-white.svg  _site/logo-wide-white.svg

          # Publish the manifests under /manifests/ so the landing page can
          # link to a stable URL regardless of whether the manifest is also
          # attached to the release. This avoids retro-uploading assets to
          # legacy releases (which would require `contents: write`) and
          # keeps Pages as the single source of truth for catalog metadata.
          mkdir -p _site/manifests
          cp release-assets/*.manifest.json _site/manifests/

          # When site/CNAME exists we are on a custom domain; otherwise
          # fall back to $SITE_URL (the github.io default). site/CNAME
          # also has to be copied INTO _site so GitHub Pages picks up the
          # hostname on deploy.
          if [[ -f site/CNAME ]]; then
            cp site/CNAME _site/CNAME
            SITE_URL="https://$(cat site/CNAME | tr -d '[:space:]')"
            echo "::notice::custom domain from site/CNAME: $SITE_URL"
          fi
          echo "SITE_URL=$SITE_URL" >> "$GITHUB_ENV"

          python scripts/build_pages.py \
            --manifests   release-assets \
            --templates   site \
            --tag         "$TAG" \
            --repo        "$REPO" \
            --catalog-url "${SITE_URL}/rpi-imager.json" \
            --out         _site
          echo "--- _site tree ---"
          ls -la _site

      - name: 📋 Pages summary
        run: |
          {
            echo "## 🌐 Pages"
            echo ""
            echo "Catalog URL: \`${SITE_URL}/rpi-imager.json\`"
            echo ""
            echo "Landing: ${SITE_URL}/"
            echo ""
            echo "### Catalog entries"
            echo ""
            echo '```json'
            cat _site/rpi-imager.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: 🚀 Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v5
